            padding: 15px;

// map() - transform each element

// filter() - keep elements that match
let evens = nums.filter(x => x % 2 === 0);
console.log(evens);   // [2, 4]

// reduce() - combine into single value
let sum = nums.reduce((acc, x) => acc + x, 0);
console.log(sum);     // 15

function createCounter(start = 0) {
    let count = start; // Private variable
    
    // Return an object with methods (closures)
    return {
        increment() {
            return ++count;
        },
        decrement() {
            return --count;
        },
        getCount() {
            return count;
        }
    };
}

const counter = createCounter(10);
console.log(counter.increment()); // 11
console.log(counter.increment()); // 12
console.log(counter.decrement()); // 11
console.log(counter.getCount()); // 11

    let balance = initialBalance;
    
    return {
        deposit(amount) {
            if (amount > 0) {
                balance += amount;
                return \`Deposited $\${amount}. New balance: $\${balance}\`;
            }
            return "Invalid amount";
        },
        
        withdraw(amount) {
            if (amount > 0 && amount <= balance) {
                balance -= amount;
                return \`Withdrew $\${amount}. New balance: $\${balance}\`;
            }
            return "Insufficient funds or invalid amount";
        },
        
        getBalance() {
            return balance;
        }
    };
}

const myAccount = createBankAccount(1000);
console.log(myAccount.deposit(500));   // "Deposited $500..."
console.log(myAccount.withdraw(200));  // "Withdrew $200..."
console.log(myAccount.getBalance());   // 1300`

    }
};

person.introduce(); // "I'm John, age 30"

                            name: 'Step 2: Call vs Apply vs Bind',

const person1 = { name: "Alice" };
const person2 = { name: "Bob" };

// call() - execute immediately

// apply() - execute immediately (array of args)
console.log(greet.apply(person2, ["Hi", "?"])); // "Hi, Bob?"

// bind() - return new function
const greetAlice = greet.bind(person1, "Hey");
console.log(greetAlice(".")); // "Hey, Alice."

    }

    if (success) {
        resolve("Operation successful!");
    } else {
        reject("Operation failed!");
    }
});

// Using the promise
myPromise
    .then(result => console.log(result))    // If resolved
    .catch(error => console.log(error));    // If rejected
    .finally(() => console.log("Done!"));   // Always runs

function Animal(name) {

}

    return \`\${this.name} makes a sound\`;
};

const dog = new Animal("Dog");
const cat = new Animal("Cat");

console.log(dog.speak()); // "Dog makes a sound"

// Inheritance
function Dog(name, breed) {

}

};

// Inheritance

const parent = document.getElementById("parent");
const child = document.getElementById("child");

// Bubbling (default) - goes up (child -> parent)
parent.addEventListener("click", () => {
    console.log("Parent bubbling");
});

child.addEventListener("click", (e) => {
    console.log("Child bubbling");
    // e.stopPropagation(); // Prevent bubbling
});

// Capturing - goes down (parent -> child)

    console.log("Parent capturing");
}, true); // Third param = true for capturing
