<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Interview Questions - Basic to Advanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
        }

        .level-button:hover,
        .level-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .expand-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .expand-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .expand-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .expand-btn:active {
            transform: translateY(0px);
        }

        .questions-container {
            display: grid;
            gap: 20px;
        }

        .question-card {
            background: #f9f9f9;
            border-left: 5px solid #667eea;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-card:hover {
            background: #f0f0f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .question-card.basic {
            border-left-color: #4CAF50;
        }

        .question-card.intermediate {
            border-left-color: #FF9800;
        }

        .question-card.advanced {
            border-left-color: #F44336;
        }

        .question-card.project {
            border-left-color: #2196F3;
            background: linear-gradient(135deg, #e3f2fd 0%, #f3e5f5 100%);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .question-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .difficulty-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .difficulty-badge.basic {
            background: #4CAF50;
            color: white;
        }

        .difficulty-badge.intermediate {
            background: #FF9800;
            color: white;
        }

        .difficulty-badge.advanced {
            background: #F44336;
            color: white;
        }

        .difficulty-badge.project {
            background: #2196F3;
            color: white;
        }

        .toggle-icon {
            font-size: 1.5em;
            transition: transform 0.3s ease;
            color: #667eea;
        }

        .toggle-icon.open {
            transform: rotate(180deg);
        }

        .question-body {
            display: none;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            margin-top: 15px;
        }

        .question-body.open {
            display: block;
        }

        .answer {
            background: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            border-left: 3px solid #667eea;
        }

        .answer h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .code-block {
            background: #272822;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 5px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            margin: 10px 0;
            line-height: 1.4;
        }

        .keyword {
            color: #f92672;
        }

        .string {
            color: #e6db74;
        }

        .function {
            color: #a6e22e;
        }

        .comment {
            color: #75715e;
        }

        .number {
            color: #ae81ff;
        }

        .tip {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-top: 10px;
            border-radius: 3px;
        }

        .tip strong {
            color: #ff9800;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        footer {
            background: #f5f5f5;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ddd;
        }

        .no-questions-msg {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 20px;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .level-button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 JavaScript Interview Questions</h1>
            <p>Complete Guide: Basic to Advanced + Mini Projects</p>
        </header>

        <div class="content">
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number">30+</div>
                    <div class="stat-label">Basic Questions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">30+</div>
                    <div class="stat-label">Intermediate Questions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">30+</div>
                    <div class="stat-label">Advanced Questions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">15</div>
                    <div class="stat-label">Mini Projects</div>
                </div>
            </div>

            <div class="nav-buttons">
                <button class="level-button active" onclick="filterQuestions('all', this)">All Questions</button>
                <button class="level-button" onclick="filterQuestions('basic', this)">Basic</button>
                <button class="level-button" onclick="filterQuestions('intermediate', this)">Intermediate</button>
                <button class="level-button" onclick="filterQuestions('advanced', this)">Advanced</button>
                <button class="level-button" onclick="filterQuestions('project', this)">Projects</button>
            </div>

            <div class="expand-controls">
                <button class="expand-btn" onclick="expandAllQuestions()">✓ Expand All</button>
                <button class="expand-btn" onclick="collapseAllQuestions()">✕ Collapse All</button>
            </div>

            <div class="questions-container" id="questionsContainer">
                <!-- Questions will be inserted here by JavaScript -->
            </div>
        </div>

        <footer>
            <p>💡 Pro Tip: Practice writing code for each answer. Don't just read!</p>
            <p>Good Luck with Your Interview! 🎯</p>
        </footer>
    </div>

    <script>
        let currentFilter = 'all';

        const questions = [
            // BASIC QUESTIONS
            {
                level: 'basic',
                number: 1,
                title: 'What is JavaScript? What are its main uses?',
                answer: `JavaScript is a high-level, interpreted programming language commonly used for:
                <ul style="margin-left: 20px; margin-top: 10px;">
                    <li>Client-side web development (DOM manipulation)</li>
                    <li>Creating interactive web pages</li>
                    <li>Server-side development (Node.js)</li>
                    <li>Mobile app development</li>
                    <li>Desktop applications (Electron)</li>
                </ul>
                <p style="margin-top: 10px;"><strong>Key Features:</strong> Lightweight, event-driven, functional programming support.</p>`
            },
            {
                level: 'basic',
                number: 2,
                title: 'Difference between var, let, and const?',
                answer: `<table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                    <tr style="background: #f0f0f0;">
                        <th style="border: 1px solid #ddd; padding: 10px;">Feature</th>
                        <th style="border: 1px solid #ddd; padding: 10px;">var</th>
                        <th style="border: 1px solid #ddd; padding: 10px;">let</th>
                        <th style="border: 1px solid #ddd; padding: 10px;">const</th>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">Scope</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Function</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Block</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Block</td>
                    </tr>
                    <tr style="background: #fafafa;">
                        <td style="border: 1px solid #ddd; padding: 10px;">Reassign</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Yes</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Yes</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">No</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">Redeclare</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Yes</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">No</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">No</td>
                    </tr>
                    <tr style="background: #fafafa;">
                        <td style="border: 1px solid #ddd; padding: 10px;">Hoisting</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">Undefined</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">TDZ</td>
                        <td style="border: 1px solid #ddd; padding: 10px;">TDZ</td>
                    </tr>
                </table>
                <div class="tip"><strong>Best Practice:</strong> Use const by default, let when you need to reassign, avoid var.</div>`
            },
            {
                level: 'basic',
                number: 3,
                title: 'What are data types in JavaScript?',
                answer: `<strong>Primitive Types (immutable):</strong>
                <div class="code-block">
let num = 42; // Number
let str = "Hello"; // String
let bool = true; // Boolean
let undef = undefined; // Undefined
let nul = null; // Null
let sym = Symbol("id"); // Symbol (unique)
let big = 123n; // BigInt
                </div>
                <strong>Reference Types (mutable):</strong>
                <div class="code-block">
let obj = { name: "John" }; // Object
let arr = [1, 2, 3]; // Array
let func = function() {}; // Function
                </div>
                <div class="tip"><strong>Key Difference:</strong> Primitives are passed by value, references are passed by reference.</div>`
            },
            {
                level: 'basic',
                number: 4,
                title: 'What is hoisting in JavaScript?',
                answer: `<strong>Definition:</strong> Hoisting is JavaScript's default behavior of moving declarations to the top of their scope before code execution.
                <div class="code-block">
<span class="comment">// Function hoisting - works!</span>
console.<span class="function">log</span>(<span class="function">add</span>(<span class="number">5</span>, <span class="number">3</span>)); <span class="comment">// 8</span>

<span class="keyword">function</span> <span class="function">add</span>(a, b) {
    <span class="keyword">return</span> a + b;
}

<span class="comment">// Variable hoisting with var</span>
console.<span class="function">log</span>(x); <span class="comment">// undefined (not error!)</span>
<span class="keyword">var</span> x = <span class="number">5</span>;

<span class="comment">// Variable hoisting with let/const - Temporal Dead Zone</span>
<span class="comment">// console.log(y); // ReferenceError</span>
<span class="keyword">let</span> y = <span class="number">10</span>;
                </div>
                <div class="tip"><strong>Note:</strong> let and const are hoisted but not initialized (Temporal Dead Zone).</div>`
            },
            {
                level: 'basic',
                number: 5,
                title: 'What is the difference between == and ===?',
                answer: `<strong>== (Loose Equality):</strong> Compares values with type coercion.
                <div class="code-block">
<span class="number">5</span> == <span class="string">"5"</span> <span class="comment">// true (type coercion)</span>
<span class="keyword">null</span> == <span class="keyword">undefined</span> <span class="comment">// true</span>
<span class="number">0</span> == <span class="keyword">false</span> <span class="comment">// true</span>
                </div>
                <strong>=== (Strict Equality):</strong> Compares values without type coercion.
                <div class="code-block">
<span class="number">5</span> === <span class="string">"5"</span> <span class="comment">// false (different types)</span>
<span class="keyword">null</span> === <span class="keyword">undefined</span> <span class="comment">// false</span>
<span class="number">0</span> === <span class="keyword">false</span> <span class="comment">// false</span>
                </div>
                <div class="tip"><strong>Best Practice:</strong> Always use === to avoid unexpected behavior.</div>`
            },
            {
                level: 'basic',
                number: 6,
                title: 'What is a function? Different ways to create functions?',
                answer: `<strong>1. Function Declaration:</strong>
                <div class="code-block">
<span class="keyword">function</span> <span class="function">greet</span>(name) {
    <span class="keyword">return</span> <span class="string">"Hello, "</span> + name;
}
                </div>
                <strong>2. Function Expression:</strong>
                <div class="code-block">
<span class="keyword">const</span> add = <span class="keyword">function</span>(a, b) {
    <span class="keyword">return</span> a + b;
};
                </div>
                <strong>3. Arrow Function:</strong>
                <div class="code-block">
<span class="keyword">const</span> multiply = (a, b) => a * b;
<span class="keyword">const</span> square = x => x * x;
                </div>
                <div class="tip"><strong>Note:</strong> Arrow functions don't have their own 'this' binding.</div>`
            },
            {
                level: 'basic',
                number: 7,
                title: 'What is an array? Common array methods?',
                answer: `<strong>Array Declaration:</strong>
                <div class="code-block">
<span class="keyword">let</span> arr = [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>];
                </div>
                <strong>Common Methods:</strong>
                <div class="code-block">
arr.<span class="function">push</span>(<span class="number">4</span>); <span class="comment">// Add to end [1,2,3,4]</span>
arr.<span class="function">pop</span>(); <span class="comment">// Remove from end [1,2,3]</span>
arr.<span class="function">shift</span>(); <span class="comment">// Remove from start [2,3]</span>
arr.<span class="function">unshift</span>(<span class="number">1</span>); <span class="comment">// Add to start [1,2,3]</span>
arr.<span class="function">slice</span>(<span class="number">0</span>, <span class="number">2</span>); <span class="comment">// [1,2] (doesn't modify)</span>
arr.<span class="function">splice</span>(<span class="number">1</span>, <span class="number">1</span>); <span class="comment">// Remove and modify</span>
arr.<span class="function">indexOf</span>(<span class="number">2</span>); <span class="comment">// 1</span>
arr.<span class="function">includes</span>(<span class="number">2</span>); <span class="comment">// true</span>
                </div>`
            },
            {
                level: 'basic',
                number: 8,
                title: 'What is an object? How to access properties?',
                answer: `<strong>Object Declaration:</strong>
                <div class="code-block">
<span class="keyword">let</span> person = {
    name: <span class="string">"John"</span>,
    age: <span class="number">30</span>,
    <span class="function">greet</span>: <span class="keyword">function</span>() {
        <span class="keyword">return</span> <span class="string">"Hi"</span>;
    }
};
                </div>
                <strong>Accessing Properties:</strong>
                <div class="code-block">
<span class="comment">// Dot notation</span>
person.name; <span class="comment">// "John"</span>

<span class="comment">// Bracket notation</span>
person[<span class="string">"age"</span>]; <span class="comment">// 30</span>

<span class="comment">// Method call</span>
person.<span class="function">greet</span>(); <span class="comment">// "Hi"</span>
                </div>`
            },
            {
                level: 'basic',
                number: 9,
                title: 'What is the typeof operator? Give examples.',
                answer: `<strong>typeof returns the data type of a value:</strong>
                <div class="code-block">
<span class="keyword">typeof</span> <span class="number">42</span>; <span class="comment">// "number"</span>
<span class="keyword">typeof</span> <span class="string">"hello"</span>; <span class="comment">// "string"</span>
<span class="keyword">typeof</span> <span class="keyword">true</span>; <span class="comment">// "boolean"</span>
<span class="keyword">typeof</span> {}; <span class="comment">// "object"</span>
<span class="keyword">typeof</span> []; <span class="comment">// "object" (array is object)</span>
<span class="keyword">typeof</span> <span class="keyword">undefined</span>; <span class="comment">// "undefined"</span>
<span class="keyword">typeof</span> <span class="keyword">null</span>; <span class="comment">// "object" (quirk!)</span>
<span class="keyword">typeof</span> <span class="keyword">function</span>() {}; <span class="comment">// "function"</span>
                </div>
                <div class="tip"><strong>Quirk:</strong> typeof null returns "object" due to a bug in JavaScript.</div>`
            },
            {
                level: 'basic',
                number: 10,
                title: 'What is the difference between null and undefined?',
                answer: `<strong>undefined:</strong> Variable is declared but not assigned a value.
                <div class="code-block">
<span class="keyword">let</span> x;
console.<span class="function">log</span>(x); <span class="comment">// undefined</span>

<span class="keyword">function</span> <span class="function">test</span>() {
    <span class="comment">// no return</span>
}
test(); <span class="comment">// returns undefined</span>
                </div>
                <strong>null:</strong> Intentional assignment of no value.
                <div class="code-block">
<span class="keyword">let</span> y = <span class="keyword">null</span>;
console.<span class="function">log</span>(y); <span class="comment">// null</span>
                </div>
                <div class="tip"><strong>Key Difference:</strong> undefined is unintentional, null is intentional.</div>`
            },
            {
                level: 'basic',
                number: 11,
                title: 'What is string concatenation? Ways to concatenate?',
                answer: `<strong>1. Using + operator:</strong>
                <div class="code-block">
<span class="string">"Hello"</span> + <span class="string">" "</span> + <span class="string">"World"</span>; <span class="comment">// "Hello World"</span>
                </div>
                <strong>2. Using template literals (backticks):</strong>
                <div class="code-block">
<span class="keyword">const</span> name = <span class="string">"John"</span>;
<span class="string">\`Hello, \${name}!\`</span>; <span class="comment">// "Hello, John!"</span>
                </div>
                <strong>3. Using concat() method:</strong>
                <div class="code-block">
<span class="string">"Hello"</span>.<span class="function">concat</span>(<span class="string">" "</span>, <span class="string">"World"</span>); <span class="comment">// "Hello World"</span>
                </div>
                <div class="tip"><strong>Best Practice:</strong> Use template literals for better readability.</div>`
            },
            {
                level: 'basic',
                number: 12,
                title: 'What is NaN? How to check for NaN?',
                answer: `<strong>NaN (Not-a-Number):</strong> Result of invalid numeric operations.
                <div class="code-block">
<span class="number">0</span> / <span class="number">0</span>; <span class="comment">// NaN</span>
<span class="keyword">parseInt</span>(<span class="string">"hello"</span>); <span class="comment">// NaN</span>
<span class="string">"text"</span> * <span class="number">5</span>; <span class="comment">// NaN</span>
                </div>
                <strong>Checking for NaN:</strong>
                <div class="code-block">
<span class="keyword">let</span> x = NaN;
<span class="keyword">typeof</span> x; <span class="comment">// "number" (quirk!)</span>

<span class="comment">// Wrong way:</span>
x == NaN; <span class="comment">// false (NaN !== NaN)</span>

<span class="comment">// Right way:</span>
<span class="keyword">isNaN</span>(x); <span class="comment">// true</span>
Number.<span class="function">isNaN</span>(x); <span class="comment">// true (more reliable)</span>
Object.<span class="function">is</span>(x, NaN); <span class="comment">// true</span>
                </div>`
            },
            {
                level: 'basic',
                number: 13,
                title: 'What are comparison operators? List all.',
                answer: `<strong>List of Comparison Operators:</strong>
                <div class="code-block">
<span class="number">5</span> > <span class="number">3</span>; <span class="comment">// true (greater than)</span>
<span class="number">5</span> < <span class="number">3</span>; <span class="comment">// false (less than)</span>
<span class="number">5</span> >= <span class="number">5</span>; <span class="comment">// true (greater than or equal)</span>
<span class="number">3</span> <= <span class="number">5</span>; <span class="comment">// true (less than or equal)</span>
<span class="number">5</span> == <span class="number">5</span>; <span class="comment">// true (loose equality)</span>
<span class="number">5</span> === <span class="number">5</span>; <span class="comment">// true (strict equality)</span>
<span class="number">5</span> != <span class="number">3</span>; <span class="comment">// true (loose inequality)</span>
<span class="number">5</span> !== <span class="number">3</span>; <span class="comment">// true (strict inequality)</span>
                </div>`
            },
            {
                level: 'basic',
                number: 14,
                title: 'What are logical operators?',
                answer: `<strong>Logical Operators:</strong>
                <div class="code-block">
<span class="keyword">true</span> && <span class="keyword">false</span>; <span class="comment">// false (AND - both true)</span>
<span class="keyword">true</span> || <span class="keyword">false</span>; <span class="comment">// true (OR - at least one true)</span>
!<span class="keyword">true</span>; <span class="comment">// false (NOT - negation)</span>
                </div>
                <strong>Short-circuit behavior:</strong>
                <div class="code-block">

        function createQuestionCard(q) {
            return `
                <div class="question-card active ${q.level}">
                    <div class="question-header" onclick="toggleQuestion(event)">
                        <div>
                            <div class="question-title">
                                <span>${q.number}. ${q.title}</span>
                            </div>
                        </div>
                        <span class="difficulty-badge ${q.level}">${q.level.toUpperCase()}</span>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="question-body">
                        <div class="answer">
                            <h4>Answer:</h4>
                            ${q.answer}
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleQuestion(event) {
            const header = event.currentTarget;
            const card = header.parentElement;
            const body = card.querySelector('.question-body');
            const icon = header.querySelector('.toggle-icon');

            body.classList.toggle('open');
            icon.classList.toggle('open');

            // Auto-scroll to the question when clicked
            if (body.classList.contains('open')) {
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        }

        function expandAllQuestions() {
            const cards = document.querySelectorAll('.question-card.active');
            cards.forEach(card => {
                const body = card.querySelector('.question-body');
                const icon = card.querySelector('.toggle-icon');
                
                body.classList.add('open');
                icon.classList.add('open');
            });

            // Smooth scroll to first question
            setTimeout(() => {
                const firstCard = document.querySelector('.question-card.active');
                if (firstCard) {
                    firstCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 200);
        }

        function collapseAllQuestions() {
            const cards = document.querySelectorAll('.question-card.active');
            cards.forEach(card => {
                const body = card.querySelector('.question-body');
                const icon = card.querySelector('.toggle-icon');
                
                body.classList.remove('open');
                icon.classList.remove('open');
            });
        }

        function renderQuestions(level) {
            const container = document.getElementById('questionsContainer');
            let filtered = questions;

            if (level !== 'all') {
                filtered = questions.filter(q => q.level === level);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-questions-msg">No questions found.</div>';
                return;
            }

            container.innerHTML = filtered.map(q => createQuestionCard(q)).join('');
        }

        function filterQuestions(level, button) {
            currentFilter = level;
            
            // Update active button
            document.querySelectorAll('.level-button').forEach(btn => {
                btn.classList.remove('active');
            });
            button.classList.add('active');

            // Render filtered questions
            renderQuestions(level);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            renderQuestions('all');
        });
    </script>
</body>
